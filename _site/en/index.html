      <header class="header" id="header">
          <a style="font-weight: 450" href="/en/">Nicolas Chaudier architect</a>

          <div class="menu">

              <div class="categorie" onclick="toggleMenu(this)">Architecture</div>
              <ul class="submenu">
                  <a href="/en/projets/2026-05-24-la-conception-iv/">La conception IV</a>
              </ul>
              <div class="categorie" onclick="toggleMenu(this)">Installations</div>

              </ul>
              <a class="categorie" href="/en/contact/Contact/">Contact</a>
          </div>
          <script>
              const menus = document.querySelectorAll('.submenu');

              menus.forEach((ul, i) => {
                  if (sessionStorage.getItem('menu-' + i) === 'open') {
                      ul.classList.add('open');
                  }
              });

              function toggleMenu(el) {
                  const ul = el.nextElementSibling;
                  const isOpen = ul.classList.contains('open');
                  menus.forEach((m, i) => {
                      m.classList.remove('open');
                      sessionStorage.setItem('menu-' + i, 'closed');
                  });
                  if (!isOpen) {
                      ul.classList.add('open');
                      const index = Array.from(menus).indexOf(ul);
                      sessionStorage.setItem('menu-' + index, 'open');
                  }
              }
          </script>
      </header>

      <script>
          const images = document.querySelectorAll('img.carrousel');
          let current = 0;
          images[0].classList.add('active');

          setInterval(() => {
              images[current].classList.remove('active');
              current = (current + 1) % images.length;
              images[current].classList.add('active');
          }, 10000);
      </script>
