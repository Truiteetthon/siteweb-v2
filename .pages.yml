media:
  input: photos
  output: /photos

content:
  - name: projets
    label: Projets
    type: collection
    path: projets
    fields:
      - name: Titre
        label: Titre
        type: string
      - name: Titre_anglais
        label: Titre_anglais
        type: string
      - name: Categorie
        type: select
        options:
          values: [Architecture, Installations]
      - name: Description
        label: Description
        type: rich-text
      - name: Description_anglais
        label: Description_anglais
        type: rich-text
      - name: Annee
        label: Annee
        type: string
      - name: Lieu
        label: Lieu
        type: string
      - name: Photographe
        label: Photographe
        type: string
      - name: Photos
        label: Photos
        type: object
        list: true
        fields:
          - name: Photo
            label: Photo
            type: image
          - name: Carrousel
            type: boolean
            default: false

  - name: contact
    label: Contact
    type: file
    path: Contact
    fields:
      - name: Titre
        label: Titre
        type: string
      - name: Titre_anglais
        label: Titre_anglais
        type: string
      - name: Description
        label: Description
        type: rich-text
      - name: Description_anglais
        label: Description_anglais
        type: rich-text
      - name: Courriel
        label: Courriel
        type: string
      - name: Telephone
        label: Telephone
        type: string
      - name: Photographe
        label: Photographe
        type: string
      - name: Photos
        label: Photos
        type: image
